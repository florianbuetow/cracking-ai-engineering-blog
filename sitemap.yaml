index.md:
  hash: 70259718d2a012d7850d94c7ca063e51
  summary: This website chronicles a personal journey from software engineering to
    AI, offering practical advice, career insights, and inspiring stories. It serves
    as a resource for readers seeking guidance and motivation in transitioning to
    AI careers. The site features various categories and a monthly newsletter for
    updates on the latest posts. Readers can follow the author's updates on Twitter
    and GitHub, with LinkedIn available for connections. Key topics include Applied
    AI, Software Engineering, Career Advice, and Personal Journey.
reading/book-club.md:
  hash: 429c8f6ee3e04eee2b9ab9d7cc1261ec
  summary: 'The Data Science and Machine Learning Book Club offers a free, engaging
    platform for book enthusiasts to delve into monthly reads related to applied AI,
    data science, and machine learning. Members participate in community-chosen book
    discussions held on Discord, with opportunities for live post-reading chats with
    authors on YouTube. The club fosters knowledge-sharing and interactive discussions,
    making it a valuable resource for those interested in expanding their understanding
    of data science and machine learning. Key terms: book club, data science, machine
    learning, reading list, author discussions, community voting.'
reading/books.md:
  hash: d7da3f33d579e34181ab5ea1ad421669
  summary: This content is a curated list of essential AI and Machine Learning (ML)
    books aimed at developers and data scientists seeking to advance their careers
    and skills. It includes recommendations for books on interview preparation, machine
    learning engineering, system design, leadership, and career development. Highlighted
    titles include "Writing for Developers" by Piotr Sarna and Cynthia Dunlop, "Ace
    the Data Science Interview" by Kevin Huo and Nick Singh, and "Build a Career in
    Data Science" by Emily Robinson and Jacqueline Nolis. The list provides insights
    into the core ideas, crucial knowledge, and skills development offered by each
    book. Key areas covered are AI, Machine Learning, Data Science, Career Development,
    and Leadership.
writing/index.md:
  hash: be7ccd29492f94ea800690a87ae67fce
  summary: This content focuses on the transition from software engineering to AI,
    offering insights into system design, project management, and technical leadership.
    Authored by fb, the writings delve into learnings, challenges, and projects encountered
    during this transition. The article features a newsletter for updates on new posts,
    curated monthly. Key topics include AI, software engineering, system design, and
    technical leadership, with a highlighted post on choosing the right technology
    for production titled "The Default Heuristic."
writing/posts/the-default-heuristic.md:
  hash: 7fcbb494d8bbbcc5c43c0eec0ccd3029
  summary: "The article, \"How to Choose Tech for Production: The Default Heuristic,\"\
    \ discusses the importance of selecting established, reliable technologies over\
    \ cutting-edge, untested alternatives for production systems. It introduces the\
    \ concept of the Default Heuristic, which prioritizes stability, maintainability,\
    \ and reliability, helping avoid the pitfalls of the Optimization Fallacy\u2014\
    chasing the \"ideal\" solution unnecessarily. Key examples include Pinterest's\
    \ and StackOverflow's successful use of proven technologies. The piece outlines\
    \ when and why to apply the Default Heuristic, highlighting its advantages in\
    \ resource-constrained projects, critical applications, and scenarios with uncertain\
    \ long-term requirements. Key benefits include proven reliability, a rich ecosystem,\
    \ talent availability, and risk reduction."
